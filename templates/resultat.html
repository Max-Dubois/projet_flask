<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Résultat Segmentation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div style="text-align: center; margin-bottom: 2rem;">
        <h1>Analyse par {{ algo | upper }}</h1>
        <p style="margin: 0.5rem 0; color: var(--text-secondary);">Paramètre k = {{ k }} | Prétraitement CLAHE appliqué</p>
        <a href="/galerie">← Retour à la galerie</a>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 2rem;">
        <div class="box">
            <h3>Image Originale</h3>
            <img src="{{ url_for('serve_image', filename=image_path) }}" alt="Image originale">
        </div>

        <div class="box">
            <h3>Résultat Segmenté</h3>
            <img src="{{ url_for('process_image', algo=algo, image_path=image_path, k=k) }}" alt="Image segmentée">
        </div>
    </div>
</body>
</html>
